name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake build
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lakefile.toml', 'lake-manifest.json') }}
          restore-keys: lake-${{ runner.os }}-

      - name: Get Mathlib cache
        working-directory: .
        run: lake exe cache get || true

      - name: Build
        working-directory: .
        run: lake build
        timeout-minutes: 60
      - name: Report sorry + axiom counts
        if: always()
        working-directory: .
        run: |
          SRC="VerificationAsymmetry"
          SORRY_TERMS=$(grep -rn -E ':= sorry|by sorry|^[[:space:]]*sorry[[:space:]]*$' "$SRC/" "$SRC.lean" --include='*.lean' 2>/dev/null | wc -l)
          AXIOMS=$(grep -h '^axiom ' "$SRC"/*.lean "$SRC.lean" 2>/dev/null | wc -l)
          echo "=== formalization counts ==="
          echo "Active sorry terms: $SORRY_TERMS"
          echo "Axiom declarations: $AXIOMS"